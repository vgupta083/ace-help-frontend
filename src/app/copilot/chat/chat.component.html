<div class="chat-container">
  <div class="input-section">
    <input [(ngModel)]="question" placeholder="Ask..." [disabled]="loading" />
    <button (click)="ask()" [disabled]="loading">
      {{ loading ? 'Asking...' : 'Ask' }}
    </button>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="loading" class="loading-message">
    Loading...
  </div>
<app-typewriter
  [text]="aiResponse"
  [speed]="15">
</app-typewriter>

  <div *ngFor="let r of results" class="card">
    <h4>{{ r.title }}</h4>
    <p>{{ r.content }}</p>
    <button (click)="go(r.route)">Open</button>
  </div>
</div>
